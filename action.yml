name: 'AI-Driven ADR Enforcer'
description: 'Audits Pull Requests against Architecture Decision Records (ADRs) using Gemini LLM.'
branding:
  icon: 'shield'
  color: 'blue'
inputs:
  github_token:
    description: 'GitHub Token for accessing PRs and posting comments. Usually secrets.GITHUB_TOKEN'
    required: true
  gemini_api_key:
    description: 'Google Gemini API Key for LLM inference.'
    required: true
  adr_directory:
    description: 'Path to the directory containing ADR Markdown files.'
    required: true
    default: 'docs/adr'
  fail_open:
    description: 'If true, the action will not fail the CI if the Gemini API is down or times out (Fail-open). Defaults to false (Fail-closed).'
    required: false
    default: 'false'
  max_diff_size:
    description: 'The maximum allowed length of the PR diff (in characters). If the diff exceeds this size, evaluation is skipped to prevent token exhaustion.'
    required: false
    default: '300000'
  auto_approve:
    description: 'If true, automatically approves PRs that are small or contain safe files only, and have risk_level low.'
    required: false
    default: 'false'
  auto_approve_max_lines:
    description: 'The line count threshold for considering a PR small for auto-approval. Defaults to 30 lines.'
    required: false
    default: '30'
  model:
    description: 'The Gemini model to use for auditing (e.g. gemini-3.1-flash-lite, gemini-3.5-flash). Defaults to gemini-3.1-flash-lite.'
    required: false
    default: 'gemini-3.1-flash-lite'
runs:
  using: 'node24'
  main: 'dist/index.js'
